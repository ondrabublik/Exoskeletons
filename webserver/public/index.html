<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Exoskeleton Sensor Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="tabs">
    <button class="tab-btn active" data-tab="live">Live Data</button>
    <button class="tab-btn" data-tab="recordings">Recordings</button>
    <button class="tab-btn" data-tab="files">Files</button>
  </div>

  <div class="live-settings">
      <div class="setting-group">
        <label for="frequency-input">Frequency (Hz):</label>
        <input
          type="number"
          id="frequency-input"
          class="input"
          min="1"
          max="1000"
          step="0.1"
          style="min-width: 80px"
        />
        <span class="muted" id="frequency-display">10</span>
      </div>
      <div class="setting-group">
        <label for="max-points-input">Max Points:</label>
        <input
          type="number"
          id="max-points-input"
          class="input"
          min="50"
          max="5000"
          step="50"
          style="min-width: 80px"
        />
        <span class="muted" id="max-points-display">300</span>
      </div>
      <div class="setting-group">
        <label>Layout:</label>
        <div class="btn-group" id="layout-selector">
          <button class="btn-icon layout-btn" data-layout="1col">1</button>
          <button class="btn-icon layout-btn active" data-layout="2col">2</button>
          <button class="btn-icon layout-btn" data-layout="4col">4</button>
        </div>
      </div>
    </div>

  <section class="panel active" id="panel-live">
    <div class="toolbar">
      <div class="dot" id="status-dot"></div>
      <span class="status" id="status-text">Connecting...</span>
      <input class="input" id="recording-name" placeholder="Optional recording name" />
      <button class="button" id="record-btn">Start Recording</button>
      <span class="muted" id="recording-state">Not recording</span>
      <span class="muted grow" id="freq-display"></span>
    </div>

    <div id="live-grid"></div>
  </section>

  <section class="panel" id="panel-recordings">
    <div class="replay-toolbar">
          <button class="button" id="replay-play">Play</button>
          <button class="button" id="replay-pause">Pause</button>
          <button class="button" id="replay-reset">Reset</button>
          <label class="muted" for="replay-speed">Speed</label>
          <select class="input" id="replay-speed" style="min-width: 92px">
            <option value="0.5">0.5x</option>
            <option value="1" selected>1x</option>
            <option value="2">2x</option>
            <option value="4">4x</option>
          </select>
          <label class="muted" for="replay-mode">Timing</label>
          <select class="input" id="replay-mode" style="min-width: 110px">
            <option value="smooth" selected>Smooth</option>
            <option value="accurate">Accurate</option>
          </select>
          <input type="range" class="range" id="replay-scrub" min="0" value="0" />
          <span class="muted" id="replay-info">No recording loaded</span>
          <div class="toolbar-right">
            <select class="input" id="recording-dropdown">
              <option value="">Select a recording...</option>
            </select>
            <button class="button" id="refresh-recordings-2">Refresh</button>
          </div>
    </div>
    <div id="replay-grid"></div>
  </section>

  <!-- FILES TAB -->
  <section class="panel" id="panel-files">
    <div class="toolbar">
      <span class="muted" id="files-count">0 files</span>
      <div class="grow"></div>
      <button class="button" id="files-refresh">Refresh</button>
      <button class="button" id="files-download-all">Download All</button>
      <button class="button danger" id="files-clear-all">Clear All</button>
    </div>
    <div class="files-table-wrap">
      <table class="files-table">
        <thead>
          <tr>
            <th>File Name</th>
            <th>Size</th>
            <th>Modified</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="files-tbody"></tbody>
      </table>
    </div>
  </section>

  <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
